<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Omkar Eduhub</title>
    <link rel="stylesheet" href="..//static/style.css">
    <link rel="stylesheet" href="..//static/register.css">

</head>
<body>
     <!-- Navbar -->
      <nav>
        <div class="logo">Omkar EduHub</div>
        <ul>
            <li><a href="home.html">Home</a></li>
            <li><a href="courses.html">Courses</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="register.html">Register</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>

    <!--Register Form-->
    <section class="register-section">
        <div class="register-box">

            <h2> Create Account</h2>
            <p class="subtittle">Join Omkar Eduhub and start learning today</p>
            <form id="register-form">
                <!--full name-->
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="Enter Your Name">
                    <span class="error" id="nameError"></span>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email">
                    <span class="error" id="emailError"></span>
                </div>

                 <!-- Grade -->
                <div class="form-group">
                    <label>Your Grade</label>
                    <select id="grade">
                        <option value="">-- Select Grade --</option>
                        <option value="9">Grade 9</option>
                        <option value="10">Grade 10</option>
                        <option value="11">Grade 11</option>
                        <option value="12">Grade 12</option>
                    </select>
                    <span class="error" id="gradeError"></span>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Create a password">
                    <span class="error" id="passwordError"></span>
                </div>

                <!-- Confirm Password -->
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Repeat your password">
                    <span class="error" id="confirmError"></span>
                </div>

                <!-- Submit -->
                <button type="button" class="btn" onclick="validateForm()">Create Account</button>

                <!-- Success Message -->
                <p class="success" id="successMsg"></p>

            </form>

            <p class="login-link">Already have an account? <a href="login.html">Login here</a></p>

        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>2026 Omkar EduHub | All Rights Reserved</p>
    </footer>

    <script src="../static/register.js"></script>

</body>
</html>
